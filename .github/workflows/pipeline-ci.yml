name: Data Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Validate data generation ─────────────────────────────────────────
  validate-data:
    name: Generate & validate mock data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas psycopg2-binary

      - name: Generate mock data
        run: python ingestion/generate_data.py

      - name: Validate CSV output
        run: |
          python - <<'EOF'
          import pandas as pd
          import sys

          df = pd.read_csv("data/transactions.csv")

          # Row count check
          assert len(df) == 5000, f"Expected 5000 rows, got {len(df)}"
          print(f"✓ Row count: {len(df)}")

          # No nulls
          assert df.isnull().sum().sum() == 0, "Null values found in dataset"
          print("✓ No null values")

          # No duplicate transaction IDs
          assert df["transaction_id"].nunique() == len(df), "Duplicate transaction IDs found"
          print("✓ No duplicate transaction IDs")

          # All amounts positive
          assert (df["amount"] > 0).all(), "Negative or zero amounts found"
          print("✓ All amounts positive")

          # Valid statuses only
          valid = {"completed", "pending", "failed"}
          assert set(df["status"].unique()).issubset(valid), f"Invalid statuses: {set(df['status'].unique()) - valid}"
          print(f"✓ Valid statuses: {df['status'].value_counts().to_dict()}")

          # Valid categories
          expected_cats = {
            "food_and_drink","groceries","transport","entertainment",
            "utilities","healthcare","shopping","travel","subscriptions","transfers"
          }
          assert set(df["category"].unique()).issubset(expected_cats), "Unknown categories found"
          print(f"✓ All categories valid")

          # Revenue sanity check
          revenue = df[df["status"]=="completed"]["amount"].sum()
          assert revenue > 1_000_000, f"Revenue too low: {revenue}"
          print(f"✓ Completed revenue: CAD ${revenue:,.2f}")

          print("\n✓ All data validation checks passed")
          EOF

  # ── Job 2: Ingestion test ────────────────────────────────────────────────────
  test-ingestion:
    name: Run ingestion against PostgreSQL
    runs-on: ubuntu-latest
    needs: validate-data

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: fintech
          POSTGRES_USER: fintech_user
          POSTGRES_PASSWORD: fintech_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas psycopg2-binary

      - name: Generate mock data
        run: python ingestion/generate_data.py

      - name: Create schema
        env:
          PGPASSWORD: fintech_pass
        run: |
          psql -h localhost -U fintech_user -d fintech -c "
            CREATE TABLE IF NOT EXISTS raw_transactions (
              id              SERIAL PRIMARY KEY,
              transaction_id  UUID NOT NULL,
              customer_id     UUID NOT NULL,
              province        VARCHAR(5),
              age_group       VARCHAR(10),
              account_type    VARCHAR(20),
              merchant        VARCHAR(100),
              category        VARCHAR(50),
              amount          NUMERIC(12,2),
              currency        VARCHAR(5),
              status          VARCHAR(20),
              txn_date        DATE,
              txn_month       VARCHAR(7),
              txn_year        INTEGER,
              loaded_at       TIMESTAMPTZ DEFAULT NOW()
            );
            CREATE TABLE IF NOT EXISTS pipeline_runs (
              id          SERIAL PRIMARY KEY,
              run_at      TIMESTAMPTZ DEFAULT NOW(),
              rows_loaded INTEGER,
              status      VARCHAR(20),
              notes       TEXT
            );
            CREATE INDEX IF NOT EXISTS idx_txn_date     ON raw_transactions(txn_date);
            CREATE INDEX IF NOT EXISTS idx_txn_category ON raw_transactions(category);
            CREATE INDEX IF NOT EXISTS idx_txn_status   ON raw_transactions(status);
          "

      - name: Run ingestion
        run: python ingestion/ingest.py

      - name: Verify data landed in PostgreSQL
        env:
          PGPASSWORD: fintech_pass
        run: |
          python - <<'EOF'
          import psycopg2

          conn = psycopg2.connect(
              host="localhost", port=5432,
              dbname="fintech", user="fintech_user", password="fintech_pass"
          )
          cur = conn.cursor()

          # Row count
          cur.execute("SELECT COUNT(*) FROM raw_transactions;")
          count = cur.fetchone()[0]
          assert count == 5000, f"Expected 5000 rows in DB, got {count}"
          print(f"✓ Rows in DB: {count}")

          # Revenue check
          cur.execute("SELECT SUM(amount) FROM raw_transactions WHERE status = 'completed';")
          revenue = float(cur.fetchone()[0])
          assert revenue > 1_000_000, f"Revenue too low: {revenue}"
          print(f"✓ Revenue in DB: CAD ${revenue:,.2f}")

          # Pipeline run logged
          cur.execute("SELECT status FROM pipeline_runs ORDER BY run_at DESC LIMIT 1;")
          run_status = cur.fetchone()[0]
          assert run_status == "success", f"Pipeline run status: {run_status}"
          print(f"✓ Pipeline run logged as: {run_status}")

          # Category coverage
          cur.execute("SELECT COUNT(DISTINCT category) FROM raw_transactions;")
          cats = cur.fetchone()[0]
          assert cats == 10, f"Expected 10 categories, got {cats}"
          print(f"✓ All {cats} categories present")

          print("\n✓ All DB verification checks passed")
          conn.close()
          EOF
