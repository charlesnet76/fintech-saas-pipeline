version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: fintech_postgres
    environment:
      POSTGRES_DB: fintech
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_pass
    ports:
      - "5432:5432"
    volumes:
      - fintech_pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech_user -d fintech"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fintech_pgdata:
