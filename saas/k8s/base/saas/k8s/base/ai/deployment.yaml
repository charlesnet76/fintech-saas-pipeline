---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: fintech-saas
  labels:
    app: ai-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ai-service
        version: v1
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/charlesnet76/fintech-saas/ai:latest
          ports:
            - containerPort: 8085
          env:
            - name: PORT
              value: "8085"
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@postgres-service:5432/$(DB_NAME)?sslmode=disable"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: shared-config
                  key: DB_NAME
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: ANTHROPIC_API_KEY
            - name: ANTHROPIC_MODEL
              value: "claude-sonnet-4-20250514"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: fintech-saas
spec:
  selector:
    app: ai-service
  ports:
    - port: 80
      targetPort: 8085
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: fintech-saas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
