---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: fintech-saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: fintech-saas/ai:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
          env:
            - name: PORT
              value: "8085"
            - name: DATABASE_URL
              value: "postgresql://fintech_user:fintech_pass@postgres-service:5432/fintech?sslmode=disable"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: ANTHROPIC_API_KEY
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: fintech-saas
spec:
  selector:
    app: ai-service
  ports:
    - port: 80
      targetPort: 8085
  type: ClusterIP
