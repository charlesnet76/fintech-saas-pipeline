---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: fintech-saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: fintech-saas/auth:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: DATABASE_URL
              value: "postgresql://fintech_user:fintech_pass@postgres-service:5432/fintech?sslmode=disable"
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: shared-secrets
                  key: JWT_REFRESH_SECRET
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: fintech-saas
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP
