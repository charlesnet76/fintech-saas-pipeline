---
apiVersion: v1
kind: Namespace
metadata:
  name: fintech-saas

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shared-config
  namespace: fintech-saas
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "fintech"
  NODE_ENV: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: shared-secrets
  namespace: fintech-saas
type: Opaque
stringData:
  DB_USER: "fintech_user"
  DB_PASSWORD: "fintech_pass"
  JWT_ACCESS_SECRET: "change-this-in-production-min-32-chars"
  JWT_REFRESH_SECRET: "change-this-in-production-min-32-chars"
  ANTHROPIC_API_KEY: "your-anthropic-api-key-here"
